# repo obj where objExpr should resolve to tree or blob
query QueryRepoObjects($owner: String!, $name: String!, $objExpr: String!) {
    repository(owner: $owner, name: $name) {
        object(expression: $objExpr) {
            __typename
            ... on Blob {
                byteSize
                isBinary
            }
            ... on Tree {
                entries {
                    name
                    type
                    object {
                        ... on Blob {
                            byteSize
                            isBinary
                        }
                    }
                }
            }
        }
    }
}

query RepoDirListing($owner: String!, $name: String!, $objExpr: String!) {
    repository(owner: $owner, name: $name) {
        object(expression: $objExpr) {
            ... on Tree {
                entries {
                    name
                    type
                    object {
                        ... on Blob {
                            byteSize
                        }
                    }
                }
            }
        }
    }
}

query ViewerRepoDirContent($name: String!, $objExpr: String!) {
    viewer {
        repository(name: $name) {
            object(expression: $objExpr) {
                ... on Tree {
                    entries {
                        name
                        type
                        object {
                            ... on Blob {
                                byteSize
                                text
                            }
                        }
                    }
                }
            }
        }
    }
}

query ViewerRepoObjectHistory(
    $repo: String!
    $branch: String!
    $path: String!
    $pageSize: Int!
    $cursor: String!
) {
    viewer {
        repository(name: $repo) {
            ref(qualifiedName: $branch) {
                target {
                    ... on Commit {
                        history(first: $pageSize, path: $path, after: $cursor) {
                            nodes {
                                oid
                                author {
                                    name
                                }
                                message
                                authoredDate
                            }
                            pageInfo {
                                hasNextPage
                                endCursor
                            }
                            totalCount
                        }
                    }
                }
            }
        }
    }
}

query _RepoObjectHistory(
    $owner: String!
    $name: String!
    $branch: String!
    $pageSize: Int!
    $path: String!
    $cursor: String
) {
    repository(owner: $owner, name: $name) {
        ref(qualifiedName: $branch) {
            target {
                ... on Commit {
                    history(first: $pageSize, path: $path, after: $cursor) {
                        nodes {
                            oid
                            author {
                                name
                            }
                            message
                            authoredDate
                        }
                        pageInfo {
                            hasNextPage
                            endCursor
                        }
                        totalCount
                    }
                }
            }
        }
    }
}

query _RepoObjectContent($owner: String!, $name: String!, $objExpr: String!) {
    repository(owner: $owner, name: $name) {
        object(expression: $objExpr) {
            ... on Blob {
                text
            }
        }
    }
}
