query QViewerRepoExists($repo: String!) {
    viewer {
        repository(name: $repo) {
            nameWithOwner
        }
    }
}

query QRepoDefaultBranch($owner: String!, $name: String!) {
    repository(owner: $owner, name: $name) {
        defaultBranchRef {
            name
            target {
                ... on Commit {
                    history(first: 1) {
                        edges {
                            node {
                                ... on Commit {
                                    committedDate
                                    oid
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}

query QViewerRepoDefaultBranch($repo: String!) {
    viewer {
        repository(name: $repo) {
            defaultBranchRef {
                name
                target {
                    ... on Commit {
                        history(first: 1) {
                            edges {
                                node {
                                    ... on Commit {
                                        committedDate
                                        oid
                                    }
                                }
                            }
                        }
                    }
                }
